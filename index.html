<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធទិន្នន័យ</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&family=Moul&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Kantumruy Pro', sans-serif;
            margin: 0;
            padding-top: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: url('bg-blurred.jpg'); /* ប្តូរឈ្មោះរូបភាពតាម GitHub របស់អ្នក */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: rgba(255, 255, 255, 0.5);
            background-blend-mode: overlay;
        }

        /* --- Navbar --- */
        .navbar {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 60px;
            background: white;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .menu-icon {
            width: 25px; height: 18px;
            display: flex; flex-direction: column; justify-content: space-between;
            cursor: pointer;
        }
        .menu-icon div { width: 100%; height: 3px; background-color: #333; border-radius: 2px; }

        /* --- Sidebar --- */
        .sidebar {
            height: 100%; width: 0;
            position: fixed; z-index: 2000;
            top: 0; left: 0;
            background-color: #2c3e50;
            overflow-x: hidden;
            transition: 0.3s;
            padding-top: 60px;
        }
        .sidebar a {
            padding: 15px 25px; text-decoration: none;
            font-size: 18px; color: #ecf0f1; display: block;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
        }
        .sidebar .closebtn { position: absolute; top: 10px; right: 25px; font-size: 36px; color: white; cursor: pointer; }

        /* --- ប៊ូតុងដើម --- */
        h1 { font-family: 'Moul', serif; color: #d35400; text-align: center; }
        .container { display: flex; flex-direction: column; gap: 15px; }
        .btn {
            width: 280px; padding: 15px; border-radius: 15px;
            text-decoration: none; font-weight: bold; text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); color: white !important;
        }
        .blue { background-color: #007bff !important; }
        .red { background-color: #ff4d4d !important; }
        .yellow { background-color: #f1c40f !important; color: #4b0082 !important; }

        /* --- Popup Modal --- */
        .modal {
            display: none; position: fixed; z-index: 3000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: white; margin: 5% auto; border-radius: 15px;
            width: 90%; max-width: 450px; overflow: hidden;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from {opacity: 0; transform: translateY(-20px);} to {opacity: 1; transform: translateY(0);} }
        .modal-header { background: #2c3e50; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 15px; max-height: 450px; overflow-y: auto; }
        
        /* តារាងក្នុង Popup */
        .teacher-card { border: 1px solid #ddd; padding: 10px; border-radius: 10px; margin-bottom: 15px; background: #f9f9f9; }
        .teacher-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .teacher-table th { text-align: left; color: #7f8c8d; font-weight: normal; padding: 5px 0; width: 40%; }
        .teacher-table td { font-weight: bold; padding: 5px 0; border-bottom: 1px solid #eee; color: #2c3e50; }
        .btn-close-pop { background: #e74c3c; color: white; border: none; padding: 10px 25px; border-radius: 8px; cursor: pointer; float: right; margin: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="menu-icon" onclick="openNav()">
            <div></div><div></div><div></div>
        </div>
        <span style="margin-left: 20px; font-weight: bold; color: #333;">Data System</span>
    </div>

    <!-- Sidebar -->
    <div id="mySidebar" class="sidebar">
        <span class="closebtn" onclick="closeNav()">&times;</span>
        <a href="#">🏠 សង្ខេបព័ត៌មាន</a>
        <a href="javascript:void(0)" onclick="openTeacherInfo()">👨‍🏫 គ្រូបង្រៀន</a>
        <a href="#">🏫 ថ្នាក់</a>
        <a href="#">🧑‍🎓 សិស្ស</a>
        <a href="#">📢 សេចក្ដីជូនដំណឹង</a>
    </div>

    <h1>ប្រព័ន្ធទិន្នន័យ</h1>

    <div class="container">
        <a href="https://docs.google.com/spreadsheets/d/1Js9S4F0SZn1pzwgjznk-ze8fWmDRy_HkmVKgnBDdOnE/edit?gid=393522210#gid=393522210" class="btn blue">ជីវប្រវត្តិសិស្សគ្រប់ថ្នាក់</a>
        <a href="https://docs.google.com/spreadsheets/u/0/d/1tGn2xgAk-zKGIrPA4lyDw1ssVu57e22t4UJkcqTnKxQ/edit" class="btn red">អត្តលេខសិស្ស</a>
        <a href="https://docs.google.com/spreadsheets/d/1PnwL3ZsdLLCKjK5jm9MwPw0Du35MfOXMd1qELAdPIb0/edit?usp=drivesdk" class="btn yellow">របាយការណ៍ស្ដង់ដាគំរូ</a>
    </div>

    <!-- Popup ព័ត៌មានគ្រូ -->
    <div id="teacherModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span style="font-family: 'Moul', serif;">ព័ត៌មានគ្រូបង្រៀន</span>
                <span style="cursor:pointer; font-size: 24px;" onclick="closeTeacherInfo()">&times;</span>
            </div>
            <div class="modal-body" id="teacherData">
                <!-- ទិន្នន័យពី Sheets នឹងបង្ហាញនៅទីនេះ -->
                <p style="text-align: center;">កំពុងទាញទិន្នន័យ...</p>
            </div>
            <div style="overflow: hidden;">
                <button class="btn-close-pop" onclick="closeTeacherInfo()">បិទ</button>
            </div>
        </div>
    </div>

    <script>
        // ប្តូរ ID ខាងក្រោមនេះឱ្យចំ ID របស់អ្នក
const sheetId = '1ctpMwkUYNZvZr6d7Chuiq_n-4tsskTNnr7zYI8f_pbg'; // <--- បិទភ្ជាប់ ID របស់អ្នកត្រង់នេះ
const tabName = 'Sheet1'; // <--- ឈ្មោះ Tab ខាងក្រោម (ត្រូវឱ្យដូចក្នុង Sheets បេះបិទ)

function openTeacherInfo() {
    document.getElementById("teacherModal").style.display = "block";
    const container = document.getElementById("teacherData");
    container.innerHTML = "<p style='text-align:center;'>កំពុងទាញទិន្នន័យ...</p>";
    closeNav();

    // បង្កើត Link សម្រាប់ទាញទិន្នន័យ
    const fullUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${tabName}`;

    fetch(fullUrl)
        .then(res => res.text())
        .then(data => {
            // សម្អាតទិន្នន័យ JSON ដែល Google ផ្ញើមក
            const jsonString = data.substring(47, data.length - 2);
            const json = JSON.parse(jsonString);
            const rows = json.table.rows;
            
            let html = "";
            // slice(1) ដើម្បីរំលងចំណងជើងជួរទី១
            rows.slice(1).forEach(row => {
                if (row.c[1] && row.c[1].v) {
                    html += `
                    <div class="teacher-card">
                        <table class="teacher-table">
                            <tr><th>ឈ្មោះ</th><td>${row.c[1].v}</td></tr>
                            <tr><th>ភេទ</th><td>${row.c[2] ? row.c[2].v : '-'}</td></tr>
                            <tr><th>តួនាទី</th><td>${row.c[3] ? row.c[3].v : '-'}</td></tr>
                            <tr><th>ទូរស័ព្ទ</th><td>${row.c[4] ? row.c[4].v : '-'}</td></tr>
                            <tr><th>ថ្ងៃចូលការងារ</th><td>${row.c[5] ? row.c[5].f || row.c[5].v : '-'}</td></tr>
                        </table>
                    </div>`;
                }
            });
            container.innerHTML = html || "<p style='text-align:center;'>មិនមានទិន្នន័យក្នុង Sheets ទេ</p>";
        })
        .catch(err => {
            container.innerHTML = "<p style='color:red; text-align:center;'>មិនអាចទាញទិន្នន័យបាន! សូមពិនិត្យ ID និងការ Share ក្នុង Sheets។</p>";
            console.error("Error fetching data:", err);
        });
}
        function closeTeacherInfo() { document.getElementById("teacherModal").style.display = "none"; }

        // ចុចខាងក្រៅ Popup ដើម្បីបិទ
        window.onclick = function(event) {
            var modal = document.getElementById("teacherModal");
            if (event.target == modal) { modal.style.display = "none"; }
        }
    </script>
</body>
</html>
