<html lang="km">
<head>

    <link rel="manifest" href="manifest.json">

    <title>ប្រព័ន្ធទិន្នន័យ</title>

    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&family=Moul&display=swap" rel="stylesheet">

    <style>
        body 
        <div class="navbar">
    <div class="menu-icon" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
    </div>
    <img src="logo.png" alt="Logo" style="height: 40px; margin-left: 50px;">
</div>

<!-- ផ្ទាំង Sidebar ដែលនឹងលោតចេញមក -->
<div id="mySidebar" class="sidebar">
    <a href="javascript:void(0)" class="closebtn" onclick="toggleMenu()">&times;</a>
    <a href="#">ផ្ទាំងគ្រប់គ្រង</a>
    <a href="#">គ្រូបង្រៀន</a>
    <a href="#">ថ្នាក់</a>
    <a href="#">សិស្ស</a>
</div>
        {
            font-family: 'Kantumruy Pro', sans-serif;
            margin: 0;
            padding-top: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;

            /* កូដសម្រាប់ Background (ប្រើឈ្មោះរូបភាពដែលអ្នកមានក្នុង GitHub) */
            background-image: url('bg-blurred.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            
            /* ស្រទាប់ពណ៌សស្ដើងៗពីលើរូបភាព ដើម្បីឱ្យមើលអក្សរច្បាស់ */
            background-color: rgba(255, 255, 255, 0.4); 
            background-blend-mode: overlay;
        }

        h1 {
            font-family: 'Moul', serif;
            color: #d35400;
            font-size: 28px;
            margin-bottom: 40px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.9);
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 18px; /* ចម្ងាយរវាងប៊ូតុង */
        }

        .btn {
            display: block;
            width: 280px;
            padding: 16px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            text-align: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        /* បង្ខំឱ្យពណ៌ប៊ូតុងបង្ហាញមកវិញ */
        .blue { 
            background-color: #007bff !important; 
            color: white !important; 
        }
        .red { 
            background-color: #ff4d4d !important; 
            color: white !important; 
        }
        .yellow { 
            background-color: #f1c40f !important; 
            color: #4b0082 !important; 
        }

        .btn:active {
            transform: scale(0.95);
        }
    /* រចនាប័ទ្ម Navbar ខាងលើ */
.navbar {
    display: flex;
    align-items: center;
    padding: 10px 20px;
    background: rgba(255, 255, 255, 0.9);
    border-bottom: 1px solid #ddd;
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 1000;
}

/* រចនាប័ទ្មត្រេបី */
.menu-icon {
    width: 25px;
    height: 18px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
}
.menu-icon div {
    width: 100%;
    height: 3px;
    background-color: #333;
    border-radius: 2px;
}

/* រចនាប័ទ្ម Sidebar */
.sidebar {
    height: 100%;
    width: 0; /* លាក់ Sidebar ជាមុន */
    position: fixed;
    z-index: 2000;
    top: 0;
    left: 0;
    background-color: #111;
    overflow-x: hidden;
    transition: 0.5s;
    padding-top: 60px;
}
.sidebar a {
    padding: 8px 32px;
    text-decoration: none;
    font-size: 20px;
    color: #818181;
    display: block;
    transition: 0.3s;
}
.sidebar a:hover { color: #f1f1f1; }
.sidebar .closebtn {
    position: absolute;
    top: 0;
    right: 25px;
    font-size: 36px;
    margin-left: 50px;
}    
    </style>
</head>
<body>

    <h1>ប្រព័ន្ធទិន្នន័យ</h1>

    <div class="container">        <a href="https://docs.google.com/spreadsheets/d/1Js9S4F0SZn1pzwgjznk-ze8fWmDRy_HkmVKgnBDdOnE/edit?gid=393522210#gid=393522210" target="_blank" class="btn blue-btn">
            ជីវប្រវត្តិសិស្សគ្រប់ថ្នាក់
        </a>

        <a href="https://docs.google.com/spreadsheets/u/0/d/1tGn2xgAk-zKGIrPA4lyDw1ssVu57e22t4UJkcqTnKxQ/edit" target="_blank" class="btn red-btn">
            អត្តលេខសិស្ស
        </a>

        <a href="https://docs.google.com/spreadsheets/d/1PnwL3ZsdLLCKjK5jm9MwPw0Du35MfOXMd1qELAdPIb0/edit?usp=drivesdk" target="_blank" class="btn yellow-btn">
            របាយការណ៍ស្ដង់ដាគំរូ
        </a>
    </div>
<script>
function toggleMenu() {
    var sidebar = document.getElementById("mySidebar");
    if (sidebar.style.width === "250px") {
        sidebar.style.width = "0";
    } else {
        sidebar.style.width = "250px";
    }
}
</script>
</body>
</html>
