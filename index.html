<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធទិន្នន័យ</title>

    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&family=Moul&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Kantumruy Pro', sans-serif;
            margin: 0;
            padding-top: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;

            /* --- ផ្នែកកូដ CSS សម្រាប់ Background --- */
            background-image: url('bg-blurred.jpg'); /* ឈ្មោះរូបភាពដែលអ្នកបង្ហោះចូល GitHub */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            
            /* ស្រទាប់ពណ៌សស្ដើងៗពីលើរូបភាព ដើម្បីឱ្យមើលអក្សរច្បាស់ */
            background-color: rgba(255, 255, 255, 0.6); 
            background-blend-mode: overlay;
        }

        h1 {
            font-family: 'Moul', serif;
            color: #d35400;
            font-size: 28px;
            margin-bottom: 40px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: block;
            width: 280px;
            padding: 15px;
            border-radius: 15px;
            text-decoration: none;
            color: #4b0082;
            font-weight: bold;
            font-size: 18px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .blue { background-color: #007bff; }
        .red { background-color: #ff4d4d; }
        .yellow { background-color: #f1c40f; }
    </style>
</head>
<body>

    <h1>ប្រព័ន្ធទិន្នន័យ</h1>

    <div class="container">
        <a href="https://docs.google.com/spreadsheets/d/1Js9S4F0SZn1pzwgjznk-ze8fWmDRy_HkmVKgnBDdOnE/edit?gid=393522210#gid=393522210" target="_blank" class="btn blue-btn">
            ជីវប្រវត្តិសិស្សគ្រប់ថ្នាក់
        </a>

        <a href="https://docs.google.com/spreadsheets/u/0/d/1tGn2xgAk-zKGIrPA4lyDw1ssVu57e22t4UJkcqTnKxQ/edit" target="_blank" class="btn red-btn">
            អត្តលេខសិស្ស
        </a>

        <a href="https://docs.google.com/spreadsheets/d/1PnwL3ZsdLLCKjK5jm9MwPw0Du35MfOXMd1qELAdPIb0/edit?usp=drivesdk" target="_blank" class="btn yellow-btn">
            របាយការណ៍ស្ដង់ដាគំរូ
        </a>
    </div>

</body>
</html>
