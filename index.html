<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធទិន្នន័យ</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&family=Moul&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Kantumruy Pro', sans-serif;
            margin: 0;
            padding-top: 100px; /* បន្ថែមចន្លោះពីលើកុំឱ្យជាន់ Navbar */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: url('bg-blurred.jpg'); /* ឈ្មោះរូបភាព Background របស់អ្នក */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: rgba(255, 255, 255, 0.5);
            background-blend-mode: overlay;
        }

        /* --- រចនាប័ទ្ម Navbar --- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: white;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        /* ប៊ូតុងត្រេបី */
        .menu-icon {
            width: 25px;
            height: 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
        }
        .menu-icon div {
            width: 100%;
            height: 3px;
            background-color: #333;
            border-radius: 2px;
        }

        /* --- រចនាប័ទ្ម Sidebar --- */
        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            background-color: #2c3e50;
            overflow-x: hidden;
            transition: 0.3s;
            padding-top: 60px;
        }
        .sidebar a {
            padding: 15px 25px;
            text-decoration: none;
            font-size: 18px;
            color: white;
            display: block;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar .closebtn {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 30px;
        }

        /* --- រចនាប័ទ្មប៊ូតុង --- */
        h1 {
            font-family: 'Moul', serif;
            color: #d35400;
            text-align: center;
            margin-bottom: 30px;
        }
        .container { display: flex; flex-direction: column; gap: 15px; }
        .btn {
            width: 280px;
            padding: 15px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            color: white !important;
        }
        .blue { background-color: #007bff !important; }
        .red { background-color: #ff4d4d !important; }
        .yellow { background-color: #f1c40f !important; color: #4b0082 !important; }
    </style>
</head>
<body>

    <!-- Navbar ជាមួយត្រេបី -->
    <div class="navbar">
        <div class="menu-icon" onclick="openNav()">
            <div></div>
            <div></div>
            <div></div>
        </div>
        <span style="margin-left: 20px; font-weight: bold; color: #333;">Data System</span>
    </div>

    <!-- Sidebar -->
    <div id="mySidebar" class="sidebar">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <a href="#">🏠 ផ្ទាំងគ្រប់គ្រង</a>
        <a href="#">👨‍🏫 គ្រូបង្រៀន</a>
        <a href="#">🏫 ថ្នាក់</a>
        <a href="#"> öğrencសិស្ស</a>
    </div>

    <h1>ប្រព័ន្ធទិន្នន័យ</h1>

    <div class="container">
        <a href="https://docs.google.com/spreadsheets/d/1Js9S4F0SZn1pzwgjznk-ze8fWmDRy_HkmVKgnBDdOnE/edit?gid=393522210#gid=393522210" class="btn blue">ជីវប្រវត្តិសិស្សគ្រប់ថ្នាក់</a>
        <a href="https://docs.google.com/spreadsheets/u/0/d/1tGn2xgAk-zKGIrPA4lyDw1ssVu57e22t4UJkcqTnKxQ/edit" class="btn red">អត្តលេខសិស្ស</a>
        <a href="https://docs.google.com/spreadsheets/d/1PnwL3ZsdLLCKjK5jm9MwPw0Du35MfOXMd1qELAdPIb0/edit?usp=drivesdk" class="btn yellow">របាយការណ៍ស្ដង់ដាគំរូ</a>
    </div>

    <script>
        function openNav() {
            document.getElementById("mySidebar").style.width = "250px";
        }
        function closeNav() {
            document.getElementById("mySidebar").style.width = "0";
        }
    </script>

</body>
</html>
