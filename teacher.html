<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>បញ្ជីព័ត៌មានគ្រូបង្រៀន - ដំណោះស្រាយចុងក្រោយ</title>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&family=Moul&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kantumruy Pro', sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #f4f7f6; 
        }

        /* ១. របារខាងលើដែលនៅជាប់រហូត (Fixed Nav) */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: white;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 2000; /* ឱ្យនៅខ្ពស់ជាងគេ */
            box-sizing: border-box;
        }

        .back-link {
            text-decoration: none;
            color: white;
            background-color: #2c3e50;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
        }

        /* ២. ផ្នែកចំណងជើង (Header) */
        .title-section {
            background-color: white;
            padding: 80px 20px 20px 20px; /* បន្ថែម Padding ខាងលើឱ្យផុតពី Navbar */
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        h1 { 
            font-family: 'Moul', serif; 
            color: #d35400; 
            font-size: 22px; 
            margin: 0;
        }

        /* ៣. តំបន់តារាង */
        .content-area {
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }

        .table-container { 
            background: white; 
            border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow: hidden; /* ដើម្បីឱ្យ Border ខាងលើស្អាត */
        }

        .scrollable-table {
            overflow-x: auto;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            min-width: 800px;
        }
        
        /* ៤. ក្បាលតារាង (Header Table) - កែសម្រួលចំណុចនេះ */
        thead th { 
            position: sticky;
            top: 60px; /* ឈប់នៅក្រោម Navbar ល្មម (កម្ពស់ Navbar គឺ 60px) */
            background-color: #f39c12; 
            color: black; 
            padding: 15px 10px; 
            z-index: 1000;
            border: 1px solid #e67e22;
        }

        td { 
            padding: 12px 10px; 
            border-bottom: 1px solid #eee; 
            text-align: center; 
            font-size: 14px;
        }

        tr:nth-child(even) { background-color: #fcfcfc; }
        tr:hover { background-color: #f1f4f9; }

        .name-col { 
            text-align: left; 
            font-weight: bold; 
            color: #2c3e50; 
            padding-left: 15px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="index.html" class="back-link">⬅ ត្រឡប់ក្រោយ</a>
    </div>

    <div class="title-section">
        <h1>👨‍🏫 បញ្ជីព័ត៌មានគ្រូបង្រៀន</h1>
    </div>

    <div class="content-area">
        <div class="table-container">
            <div class="scrollable-table">
                <table>
                    <thead>
                        <tr>
                            <th>ល.រ</th>
                            <th>ឈ្មោះគ្រូ</th>
                            <th>ភេទ</th>
                            <th>តួនាទី</th>
                            <th>កាំប្រាក់</th>
                            <th>លេខទូរស័ព្ទ</th>
                            <th>ថ្ងៃចូលបម្រើការងារ</th>
                        </tr>
                    </thead>
                    <tbody id="teacherRows">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const sheetId = '1ctpMwkUYNZvZr6d7Chuiq_n-4tsskTNnr7zYI8f_pbg'; 
        const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

        async function getTeachers() {
            const tbody = document.getElementById("teacherRows");
            try {
                const res = await fetch(url);
                const text = await res.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const rows = json.table.rows;
                
                let html = "";
                rows.forEach((row, index) => {
                    if (row.c && row.c[1] && row.c[1].v) {
                        let phone = row.c[5] ? row.c[5].v.toString() : '-';
                        if (phone !== '-' && !phone.startsWith('0')) phone = '0' + phone;

                        html += `
                        <tr>
                            <td>${row.c[0] ? row.c[0].v : (index + 1)}</td>
                            <td class="name-col">${row.c[1].v}</td>
                            <td>${row.c[2] ? row.c[2].v : '-'}</td>
                            <td>${row.c[3] ? row.c[3].v : '-'}</td>
                            <td>${row.c[4] ? row.c[4].v : '-'}</td>
                            <td style="color: #27ae60; font-weight: bold;">${phone}</td>
                            <td>${row.c[6] ? (row.c[6].f || row.c[6].v) : '-'}</td>
                        </tr>`;
                    }
                });
                tbody.innerHTML = html;
            } catch (err) {
                tbody.innerHTML = "<tr><td colspan='7' style='color:red;'>មិនអាចទាញទិន្នន័យបាន!</td></tr>";
            }
        }
        getTeachers();
    </script>
</body>
</html>
